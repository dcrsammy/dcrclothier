<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — DCR Clothier</title>
<link rel="stylesheet" href="/style.css">
<style>
.success-page {
  padding-top: 64px;
  min-height: 100vh;
  background: var(--off);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 24px;
}

.success-card {
  background: var(--white);
  max-width: 560px;
  width: 100%;
  padding: 64px 56px;
  text-align: center;
}

.success-icon {
  width: 64px; height: 64px;
  border: 1px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 24px;
  color: var(--gold);
}

.success-card h1 {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 300;
  margin-bottom: 12px;
}

.success-card h1 em { font-style: italic; color: var(--gold); }

.success-card p {
  font-size: 14px;
  color: var(--mid);
  line-height: 1.8;
  margin-bottom: 8px;
}

.order-ref {
  background: var(--off);
  padding: 20px;
  margin: 28px 0;
  text-align: left;
}

.order-ref-label {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.order-ref-num {
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--black);
}

.success-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 36px;
}
</style>
</head>
<body>
<div id="nav-mount"></div>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>Order <em>Confirmed</em></h1>
    <p>Thank you. Your order is in and we're on it. You'll receive a confirmation email shortly.</p>
    <div class="order-ref" id="order-ref" style="display:none">
      <div class="order-ref-label">Order Reference</div>
      <div class="order-ref-num" id="ref-num"></div>
    </div>
    <p style="font-size:13px;">Questions? DM us @dcrclothier or reach us on WhatsApp.</p>
    <div class="success-actions">
      <a href="/shop.html" class="btn btn-dark">Continue Shopping</a>
      <a href="/index.html" class="btn btn-outline">Back to Home</a>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="/config.js"></script>
<script src="/app.js"></script>
<script>
  document.getElementById('nav-mount').innerHTML = renderNav();
  document.getElementById('footer-mount').innerHTML = renderFooter();

  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) {
    document.getElementById('order-ref').style.display = 'block';
    document.getElementById('ref-num').textContent = ref;
  }
</script>
</body>
</html>
